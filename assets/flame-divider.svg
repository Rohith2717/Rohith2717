<svg viewBox="0 0 1000 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4B0082"/>
      <stop offset="45%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="flameGrad2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2d004d"/>
      <stop offset="50%" stop-color="#DC143C"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <path id="flameShape" d="M0,60 C-8,42 6,34 0,18 C10,28 16,14 8,0 C24,10 26,32 14,44 C22,40 24,30 22,22 C34,34 30,54 14,60 C10,54 6,58 0,60 Z"/>
  </defs>

  <rect x="0" y="58" width="1000" height="2" fill="#2a0000"/>

  <g>
    <use href="#flameShape" x="20"  y="20" fill="url(#flameGrad)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;1,1.25;0.95,0.9;1,1" keyTimes="0;0.3;0.6;1" dur="1.1s" begin="0s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="120" y="20" fill="url(#flameGrad2)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;0.9,1.3;1,0.95;1,1" keyTimes="0;0.35;0.65;1" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="220" y="20" fill="url(#flameGrad)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;1.1,1.2;0.95,1;1,1" keyTimes="0;0.4;0.7;1" dur="1.3s" begin="0.3s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="320" y="20" fill="url(#flameGrad2)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;0.95,1.35;1,0.9;1,1" keyTimes="0;0.3;0.6;1" dur="1s" begin="0.45s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="420" y="20" fill="url(#flameGrad)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;1.05,1.2;0.9,0.95;1,1" keyTimes="0;0.35;0.65;1" dur="1.15s" begin="0.6s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="520" y="20" fill="url(#flameGrad2)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;0.9,1.3;1,1;1,1" keyTimes="0;0.3;0.6;1" dur="0.95s" begin="0.1s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="620" y="20" fill="url(#flameGrad)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;1.1,1.25;0.95,0.9;1,1" keyTimes="0;0.4;0.7;1" dur="1.2s" begin="0.25s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="720" y="20" fill="url(#flameGrad2)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;0.95,1.3;1,0.95;1,1" keyTimes="0;0.3;0.6;1" dur="1.05s" begin="0.4s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="820" y="20" fill="url(#flameGrad)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;1.05,1.2;0.9,1;1,1" keyTimes="0;0.35;0.65;1" dur="1.1s" begin="0.55s" repeatCount="indefinite"/>
    </use>
    <use href="#flameShape" x="920" y="20" fill="url(#flameGrad2)">
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1,1;0.9,1.35;1,0.9;1,1" keyTimes="0;0.3;0.6;1" dur="0.9s" begin="0.2s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- roaming flame crossing left to right -->
  <g opacity="0.9">
    <use href="#flameShape" x="0" y="14" transform="scale(1.6)" fill="url(#flameGrad2)">
      <animateTransform attributeName="transform" type="translate" values="-40,0;640,0" dur="3.2s" repeatCount="indefinite" additive="sum"/>
    </use>
  </g>

  <!-- roaming flame crossing right to left -->
  <g opacity="0.85">
    <use href="#flameShape" x="0" y="18" transform="scale(1.3)" fill="url(#flameGrad)">
      <animateTransform attributeName="transform" type="translate" values="1000,0;-60,0" dur="4s" repeatCount="indefinite" additive="sum"/>
    </use>
  </g>
</svg>
