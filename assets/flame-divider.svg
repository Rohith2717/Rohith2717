<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cursor Flame</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
}

svg{
    width:100vw;
    height:100vh;
}

#flame{
    transform-origin:center;
    filter:url(#glow);
}
</style>
</head>

<body>

<svg viewBox="0 0 1000 700">

<defs>

<filter id="glow">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>

<linearGradient id="outer" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#8B0000"/>
    <stop offset="60%" stop-color="#FF4500"/>
    <stop offset="100%" stop-color="#FFD54A"/>
</linearGradient>

<linearGradient id="inner" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#ff5a00"/>
    <stop offset="70%" stop-color="#ffe27a"/>
    <stop offset="100%" stop-color="#ffffff"/>
</linearGradient>

</defs>

<g id="flame">

<!-- Outer Flame -->
<path fill="url(#outer)"
d="
M0 180
C-80 90 -70 -20 0 -120
C30 -60 60 -20 90 -130
C170 -20 140 60 80 120
C180 70 210 -10 170 -110
C300 40 240 170 90 200
C60 190 30 185 0 180
">

<animate
attributeName="d"
dur="0.22s"
repeatCount="indefinite"
values="
M0 180 C-80 90 -70 -20 0 -120 C30 -60 60 -20 90 -130 C170 -20 140 60 80 120 C180 70 210 -10 170 -110 C300 40 240 170 90 200 C60 190 30 185 0 180;

M0 180 C-95 100 -60 -30 0 -135 C40 -70 70 -10 95 -145 C185 -15 155 70 90 135 C195 60 220 -20 180 -120 C315 50 250 180 95 205 C65 195 35 188 0 180;

M0 180 C-80 90 -70 -20 0 -120 C30 -60 60 -20 90 -130 C170 -20 140 60 80 120 C180 70 210 -10 170 -110 C300 40 240 170 90 200 C60 190 30 185 0 180
"/>
</path>

<!-- Inner Flame -->
<path fill="url(#inner)"
d="
M30 150
C0 80 30 10 60 -70
C85 -20 100 40 90 90
C140 40 150 -10 120 -80
C210 30 170 120 80 160
C60 158 45 154 30 150
">
<animateTransform
attributeName="transform"
type="scale"
values="1;1.05;0.96;1"
dur="0.15s"
repeatCount="indefinite"/>
</path>

</g>

</svg>

<script>

const flame=document.getElementById("flame");

let lastX=0;
let lastY=0;

document.addEventListener("mousemove",(e)=>{

    const x=e.clientX;
    const y=e.clientY;

    const dx=x-lastX;
    const dy=y-lastY;

    const angle=Math.atan2(dy,dx)*180/Math.PI;

    flame.setAttribute(
        "transform",
        `translate(${x} ${y}) rotate(${angle}) scale(0.9)`
    );

    lastX=x;
    lastY=y;

});

</script>

</body>
</html>
