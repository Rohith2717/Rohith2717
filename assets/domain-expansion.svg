<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="burstGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DC143C" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#4B0082" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="220" fill="#0d0d0d"/>

  <!-- background glow pulse -->
  <circle cx="450" cy="110" r="20" fill="url(#burstGrad)">
    <animate attributeName="r" values="20;20;260;260" keyTimes="0;0.55;0.85;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.8;0" keyTimes="0;0.5;0.65;1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- expanding rings -->
  <circle cx="450" cy="110" r="10" fill="none" stroke="#DC143C" stroke-width="2">
    <animate attributeName="r" values="10;10;320" keyTimes="0;0.58;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.6;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="110" r="10" fill="none" stroke="#8B0000" stroke-width="2">
    <animate attributeName="r" values="10;10;280" keyTimes="0;0.6;1" dur="5s" begin="0.12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0" keyTimes="0;0.57;0.62;1" dur="5s" begin="0.12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="110" r="10" fill="none" stroke="#4B0082" stroke-width="2">
    <animate attributeName="r" values="10;10;340" keyTimes="0;0.62;1" dur="5s" begin="0.22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.7;0" keyTimes="0;0.59;0.64;1" dur="5s" begin="0.22s" repeatCount="indefinite"/>
  </circle>

  <!-- particle shards -->
  <g stroke="#FF8C00" stroke-width="2">
    <line x1="450" y1="110" x2="450" y2="60" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-90" keyTimes="0;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.65;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="110" x2="450" y2="160" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,90" keyTimes="0;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.65;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="110" x2="400" y2="110" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;-90,0" keyTimes="0;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.65;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="110" x2="500" y2="110" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0;90,0" keyTimes="0;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.65;1" dur="5s" begin="0.05s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- main text -->
  <text x="450" y="118" text-anchor="middle" font-family="Consolas, monospace" font-size="36" font-weight="bold" fill="#f5f5f5" letter-spacing="4" opacity="0">
    DOMAIN EXPANSION
    <animateTransform attributeName="transform" type="scale" values="0.7,0.7;0.7,0.7;1.15,1.15;1,1" keyTimes="0;0.55;0.65;1" dur="5s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.62;0.9;1" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="150" text-anchor="middle" font-family="Consolas, monospace" font-size="14" fill="#DC143C" letter-spacing="2" opacity="0">
    Total Concentration :: AI &amp; Data Science
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.68;0.9;1" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- idle text shown between bursts -->
  <text x="450" y="118" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#8B0000" letter-spacing="3" opacity="0">
    charging...
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.1;0.45;0.55;1" dur="5s" repeatCount="indefinite"/>
  </text>
</svg>
